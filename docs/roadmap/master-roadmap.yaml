metadata:
  title: Telecom OSS/BSS Platform Roadmap
  description: >
    Comprehensive roadmap for building a complete ISP/Telco OSS/BSS platform spanning
    foundation, commercial core, revenue core, operations core, service assurance,
    and commercial release phases.
  version: "1.0"
  last_updated: "2026-06-20"
  status: Active
  note: "Phases 1-5 complete. All P0-P2 features in Phases 2-4 are now delivered. Phase 6 (Commercial Release) is the final phase."
  owner: Platform Architecture Team

platform_overview:
  name: Telco OSS/BSS Platform
  architecture: Clean Architecture / Domain-Driven Design
  backend: .NET 8+ with ASP.NET Core
  frontend: Blazor / Angular
  database: PostgreSQL
  message_bus: RabbitMQ / Azure Service Bus
  containerization: Docker / Kubernetes
  identity: Keycloak
  observability: OpenTelemetry / Prometheus / Grafana / Serilog
  ci_cd: GitHub Actions
  api_style: REST + gRPC (inter-service)

phases:
  - id: P1
    name: Foundation
    status: completed
    completed_date: "2026-06-20"
    description: >
      Establish the foundational architecture, development infrastructure, and cross-cutting
      concerns required to support all subsequent domain modules. This phase builds the
      bedrock — repository structure, shared kernel libraries, DevSecOps pipeline,
      observability stack, IAM, database infrastructure, and module scaffolds.
    duration: "3 months"
    start_date: "2026-04-01"
    end_date: "2026-06-30"
    epics:
      - id: E1.1
        name: Repository & Solution Structure
        description: >
          Initialize the .NET solution with Clean Architecture multi-project structure,
          Git repository conventions, and standardized build/packaging configuration
          used by every module in the platform.
        features:
          - id: F-001
            name: .NET Solution Structure
            description: >
              Create the multi-project .NET solution with Clean Architecture separation
              (Domain, Application, Infrastructure, API layers per module) and a shared
              kernel cross-cutting project.
            priority: P0
            dependencies: []
            acceptance_criteria:
              - Solution compiles with zero warnings
              - All layer projects reference correctly (no circular dependencies)
              - Domain layer has zero external dependencies
              - Build completes in under 2 minutes
          - id: F-002
            name: Git Repository & Branching Strategy
            description: >
              Initialize Git repository, implement trunk-based branching with short-lived
              feature branches, configure .gitignore, and establish commit conventions.
            priority: P0
            dependencies: []
            acceptance_criteria:
              - Repository initialized with .gitignore for .NET projects
              - Branch protection rules configured on main
              - Commit message convention documented and enforced
              - PR template available
          - id: F-003
            name: Package Management & Build Configuration
            description: >
              Configure centralized NuGet package management with Directory.Build.props,
              package versioning strategy, and solution-wide build settings.
            priority: P1
            dependencies: [F-001]
            acceptance_criteria:
              - Directory.Build.props controls all common package versions
              - NuGet.config points to correct feeds (public + private)
              - Solution builds with single command: dotnet build
              - Package versioning follows SemVer convention
      - id: E1.2
        name: Shared Kernel
        description: >
          Build the shared kernel library containing base classes, domain primitives,
          value objects, domain event infrastructure, error handling patterns, and
          application abstractions used by every module in the platform.
        features:
          - id: F-004
            name: Base Domain Classes
            description: >
              Create Entity, AggregateRoot, ValueObject, DomainEvent base classes
              with proper equality, identity management, and event sourcing support.
            priority: P0
            dependencies: [F-001]
            acceptance_criteria:
              - Entity base class provides typed Id, equality, and domain event collection
              - ValueObject base class provides structural equality
              - AggregateRoot enforces consistency boundary rules
              - DomainEvent includes timestamp, correlationId, and causationId
          - id: F-005
            name: Domain Primitives & Validation
            description: >
              Implement domain primitives (Money, Percentage, Email, PhoneNumber),
              guard clauses, business rule validation pattern, and the Result type
              for error handling without exceptions.
            priority: P0
            dependencies: [F-001]
            acceptance_criteria:
              - Money type prevents invalid currency/amount combinations
              - Email type validates format and provides canonical form
              - Guard clauses cover null, range, string, and collection checks
              - Result type supports success/failure with typed errors
              - Business rule validation returns all failures, not just first
          - id: F-006
            name: Application Abstractions
            description: >
              Define application layer interfaces and base implementations including
              CQRS command/query pattern (MediatR), IRepository, IUnitOfWork,
              and pipeline behaviors for cross-cutting concerns.
            priority: P1
            dependencies: [F-004]
            acceptance_criteria:
              - IRepository<T> provides standard CRUD + specification pattern
              - IUnitOfWork ensures atomic commits across aggregates
              - Command/Query base classes with validation pipeline
              - Pipeline behaviors for logging, validation, and transaction management
          - id: F-007
            name: Cross-Cutting Concerns
            description: >
              Implement shared cross-cutting infrastructure including domain event
              dispatcher, specification pattern, pagination utilities, and
              telecom-specific value objects (Bandwidth, IPAddress, MacAddress).
            priority: P1
            dependencies: [F-005]
            acceptance_criteria:
              - Domain event dispatcher publishes events via MediatR
              - Specification pattern supports LINQ composition
              - Pagination supports offset/cursor-based strategies
              - Telecom VOs enforce valid range and formatting rules
      - id: E1.3
        name: DevSecOps
        description: >
          Establish the complete development and deployment infrastructure including
          Docker Compose for local development, CI/CD pipelines via GitHub Actions,
          code quality gates, security scanning, and artifact management.
        features:
          - id: F-008
            name: Docker Compose Development Environment
            description: >
              Create Docker Compose configuration for local development with PostgreSQL,
              Redis, RabbitMQ, Keycloak, Prometheus, and Grafana.
            priority: P0
            dependencies: [F-001]
            acceptance_criteria:
              - All infrastructure services start with docker compose up
              - PostgreSQL with persistent volume for dev data
              - Keycloak pre-configured with realm and test users
              - Prometheus and Grafana auto-configured for metrics collection
          - id: F-009
            name: CI/CD Pipeline
            description: >
              Build GitHub Actions CI pipeline (build, test, lint, security scan) and
              CD pipeline (container build, push, deploy to staging environment).
            priority: P0
            dependencies: [F-001, F-003]
            acceptance_criteria:
              - CI pipeline triggers on every PR and push to main
              - Pipeline runs unit tests, integration tests, and code analysis
              - CD pipeline deploys to staging on successful main merge
              - Build artifacts published to container registry
          - id: F-010
            name: Code Quality & Linting
            description: >
              Configure Roslyn analyzers, StyleCop rules, SonarQube integration, and
              enforce coding standards across the solution.
            priority: P1
            dependencies: [F-001]
            acceptance_criteria:
              - StyleCop configuration with team-agreed ruleset
              - SonarQube analysis runs in CI pipeline
              - Code coverage minimum threshold configured (80%)
              - Custom Roslyn analyzers for architecture rules (layer violations)
          - id: F-011
            name: Security Scanning
            description: >
              Integrate dependency scanning (OWASP DependencyCheck / Trivy),
              SAST analysis (Semgrep / Roslyn security rules), and container scanning.
            priority: P1
            dependencies: [F-009]
            acceptance_criteria:
              - Dependency scan runs on every PR
              - SAST rules configured for OWASP Top 10
              - Container images scanned before registry push
              - Security gates block pipeline on critical findings
          - id: F-012
            name: Container Registry & Artifact Management
            description: >
              Set up container registry (GitHub Container Registry) and NuGet package
              feed for internal packages.
            priority: P2
            dependencies: [F-008, F-009]
            acceptance_criteria:
              - Images pushed to registry with semantic version tags
              - Internal NuGet packages published to private feed
              - Retention policies configured for old artifacts
      - id: E1.4
        name: Observability
        description: >
          Implement comprehensive observability with OpenTelemetry for distributed tracing
          and metrics, structured logging with Serilog, health checks, and pre-built
          Grafana dashboards for monitoring all platform services.
        features:
          - id: F-013
            name: OpenTelemetry SDK Integration
            description: >
              Configure OpenTelemetry SDK as the single telemetry pipeline exporting
              traces, metrics, and logs to configured backends (Prometheus, Jaeger, Loki).
            priority: P0
            dependencies: [F-001]
            acceptance_criteria:
              - OpenTelemetry configured as singleton in service startup
              - Trace exporter sends to Jaeger or Zipkin endpoint
              - Metric exporter sends to Prometheus endpoint
              - SDK auto-instruments ASP.NET Core, EF Core, HTTP client
          - id: F-014
            name: Structured Logging
            description: >
              Implement structured logging with Serilog, including enrichers for
              correlation IDs, tenant context, and structured data sinks.
            priority: P0
            dependencies: [F-001]
            acceptance_criteria:
              - All log output is structured JSON
              - Correlation ID automatically included in every log entry
              - Log levels configurable per namespace at runtime
              - Sinks configured for console, file (JSON), and Elasticsearch/Loki
          - id: F-015
            name: Metrics & Monitoring
            description: >
              Define and expose business and technical metrics via OpenTelemetry,
              configure Prometheus scrape targets, and create Grafana dashboards
              for platform health and performance.
            priority: P1
            dependencies: [F-013]
            acceptance_criteria:
              - Custom metrics for request rate, latency, error rate, and business KPI
              - Prometheus configured to scrape all service endpoints
              - Grafana dashboards for service health, API performance, and business metrics
              - Metrics include labels for service, version, environment
          - id: F-016
            name: Distributed Tracing
            description: >
              Configure distributed tracing across all services with OpenTelemetry,
              enabling end-to-end request visibility across module boundaries.
            priority: P1
            dependencies: [F-013]
            acceptance_criteria:
              - Traces propagate across HTTP and message queue boundaries
              - Span attributes include business context (customerId, orderId)
              - Trace sampling configured (head-based for production)
              - Jaeger/Grafana Tempo configured for trace storage and query
          - id: F-017
            name: Health Checks & Alerting
            description: >
              Implement ASP.NET Core health checks for all dependencies (database,
              message bus, cache, external services) and configure alerting rules.
            priority: P2
            dependencies: [F-015, F-016]
            acceptance_criteria:
              - Health endpoint returns liveness, readiness, and dependency status
              - Degraded dependencies reported with specific failure details
              - Prometheus AlertManager rules configured for critical alerts
              - Alert notifications sent to configured channel (Slack/Email)
      - id: E1.5
        name: Identity & Access Management
        description: >
          Build the IAM module integrating Keycloak for identity management, implementing
          authentication (JWT/OIDC), authorization (RBAC), user management, role management,
          and permission management. This is the first domain module following the full
          layered architecture pattern.
        features:
          - id: F-018
            name: Keycloak Integration & Setup
            description: >
              Deploy and configure Keycloak with realm, clients, identity providers,
              and user federation for the platform.
            priority: P0
            dependencies: [F-008]
            acceptance_criteria:
              - Keycloak configured with master realm for admin and tenant realms
              - OIDC client configured for platform SPA and service clients
              - Pre-configured admin user and test users
              - Keycloak health check integrated into platform health endpoint
          - id: F-019
            name: Authentication Service
            description: >
              Implement authentication service with login, logout, token refresh,
              and multi-factor authentication support.
            priority: P0
            dependencies: [F-018]
            acceptance_criteria:
              - Login accepts username/password and returns JWT + refresh token
              - Token refresh extends session without re-authentication
              - MFA enforcement configurable per user/role
              - Logout invalidates tokens across all sessions
          - id: F-020
            name: Authorization & RBAC
            description: >
              Implement role-based access control with policy-based authorization,
              permission checks, and resource-level access control.
            priority: P0
            dependencies: [F-018, F-019]
            acceptance_criteria:
              - RBAC middleware checks role membership for protected endpoints
              - Policy-based authorization supports AND/OR role combinations
              - Resource-level authorization (owns data vs. admin access)
              - Permission checks available as attributes and programmatic API
          - id: F-021
            name: User Management
            description: >
              Implement user CRUD, user profile management, password management,
              user search, and user lifecycle (activate/suspend/delete).
            priority: P1
            dependencies: [F-018]
            acceptance_criteria:
              - Admin can create, read, update, delete users
              - Users can update own profile and change password
              - User search supports filtering by status, role, and attributes
              - Account suspension prevents authentication without data loss
          - id: F-022
            name: Permission & Role Management
            description: >
              Implement role CRUD, permission assignment, role hierarchy, and
              role-audit logging for compliance.
            priority: P1
            dependencies: [F-018]
            acceptance_criteria:
              - Admin can create, read, update, delete roles
              - Permissions assigned to roles, roles assigned to users
              - Role hierarchy with inheritance (admin inherits all)
              - All role/permission changes logged to audit trail
      - id: E1.6
        name: Database Foundation
        description: >
          Establish the database infrastructure including EF Core configuration,
          migration infrastructure, seed data framework, repository pattern,
          and database health monitoring.
        features:
          - id: F-023
            name: Database Migration Infrastructure
            description: >
              Create EF Core migration infrastructure with design-time factories,
              migration history tracking, and automated migration application
              on startup for development environments.
            priority: P0
            dependencies: [F-001]
            acceptance_criteria:
              - Migrations generated and applied via dotnet ef CLI
              - Migration history table tracks all applied migrations
              - Idempotent migration script generation for production
              - Rollback support with migration reversal
          - id: F-024
            name: Entity Framework Configuration & Conventions
            description: >
              Configure DbContext with custom conventions for shadow properties
              (Audit fields, soft delete, tenant ID), value converter conventions,
              and global query filters.
            priority: P0
            dependencies: [F-023]
            acceptance_criteria:
              - Custom conventions apply audit fields (CreatedAt, UpdatedAt, CreatedBy)
              - Soft delete filter applied globally via query filter
              - Value converters for domain primitives (Money, Email, etc.)
              - Tenant ID filter for multi-tenant isolation
          - id: F-025
            name: Repository & Unit of Work Implementation
            description: >
              Implement the generic repository pattern with specification support
              and unit of work for atomic transaction management.
            priority: P1
            dependencies: [F-024, F-006]
            acceptance_criteria:
              - Generic repository supports GetById, GetAll, Add, Update, Delete
              - Specification pattern composes filters, includes, and sorting
              - Unit of work coordinates multiple repository changes in one transaction
              - Repositories return domain entities, not data models
      - id: E1.7
        name: Module Scaffolding
        description: >
          Create the module template structure, code generation tools, and scaffolding
          to enable rapid creation of new bounded context modules following the
          platform's conventions. Scaffold all planned module structures.
        features:
          - id: F-026
            name: Module Template & Code Generation
            description: >
              Create a module template with standard Clean Architecture folder structure,
              project references, and base files. Implement dotnet new template or
              script-based code generation.
            priority: P1
            dependencies: [F-001]
            acceptance_criteria:
              - Module template creates Domain, Application, Infrastructure, API projects
              - Template configures project references to Shared Kernel
              - Template includes sample entity, command, handler, and controller
              - Code generation creates consistent module registration code
          - id: F-027
            name: Module Registration & Configuration
            description: >
              Build the module registration system that auto-discovers and configures
              modules at startup, including dependency injection, MediatR registration,
              and endpoint mapping.
            priority: P1
            dependencies: [F-026]
            acceptance_criteria:
              - Modules auto-register their DI services via assembly scanning
              - MediatR handlers registered automatically per module
              - Module endpoints mapped via extension methods
              - Module health checks aggregated into platform health endpoint
          - id: F-028
            name: Scaffold All Domain Modules
            description: >
              Use the module template to scaffold all 19 planned domain module structures
              so they are ready for implementation in subsequent phases.
            priority: P1
            dependencies: [F-027]
            acceptance_criteria:
              - All 19 modules created with correct project structure
              - Each module compiles after scaffolding
              - Module registration entries created for each module
              - Module readme and placeholder documentation generated

  - id: P2
    name: Commercial Core
    status: completed
    completed_date: "2026-10-31"
    description: >
      Build the commercial customer-facing modules: Customer Relationship Management,
      Product Catalog, Order Management, and Subscription Management. These modules
      handle customer data, product offerings, order capture/fulfillment, and
      subscription lifecycle.
    duration: "4 months"
    start_date: "2026-07-01"
    end_date: "2026-10-31"
    epics:
      - id: E2.1
        name: Customer Relationship Management
        description: Manage customer data, segments, communications, and lifecycle
        features:
          - id: F-029
            name: Customer CRUD & Profile Management
            priority: P0
            dependencies: [F-019, F-024]
            acceptance_criteria:
              - Create, read, update, delete customers with contact information
              - Customer search by name, phone, email, account number
              - Customer profile includes billing address, service address, contact preferences
              - Duplicate detection across identity fields
          - id: F-030
            name: Customer Segmentation
            priority: P1
            dependencies: [F-029]
            acceptance_criteria:
              - Segment definition with dynamic rules (usage, plan type, region)
              - Customers auto-assigned to segments based on rules
              - Segment membership history tracked for reporting
          - id: F-031
            name: Customer Lifecycle Management
            priority: P1
            dependencies: [F-029]
            acceptance_criteria:
              - Lifecycle states: Lead, Prospect, Active, Suspended, Closed
              - State transitions with validation rules
              - Lifecycle history with timestamps and reasons
          - id: F-032
            name: Communication Preferences
            priority: P2
            dependencies: [F-029]
            acceptance_criteria:
              - Channel opt-in/opt-out (Email, SMS, Push, Mail)
              - Consent tracking with timestamps and audit trail
              - Do-not-disturb window configuration
      - id: E2.2
        name: Product Catalog
        description: Define products, services, offers, pricing, and product lifecycle
        features:
          - id: F-033
            name: Product & Service Definition
            priority: P0
            dependencies: [F-024]
            acceptance_criteria:
              - Product hierarchy: Category, Product, Service, Plan
              - Product characteristics with type, validation, and defaults
              - Product relationships (requires, excludes, bundles)
              - Versioned product definitions with effective dating
          - id: F-034
            name: Offer & Price Management
            priority: P0
            dependencies: [F-033]
            acceptance_criteria:
              - Offers composed of one or more products/services
              - Pricing models: flat, tiered, volume-based, usage-based
              - Recurring and one-time charges
              - Promotional pricing with start/end dates
          - id: F-035
            name: Product Configuration
            priority: P1
            dependencies: [F-033]
            acceptance_criteria:
              - Product configuration rules with allowed/required options
              - Dependency validation during configuration
              - Compatibility matrix for product combinations
          - id: F-036
            name: Product Lifecycle Management
            priority: P1
            dependencies: [F-033]
            acceptance_criteria:
              - Lifecycle states: Draft, Active, Deprecated, Retired
              - Grandfathering rules for existing subscribers on deprecated plans
              - Migration path definitions between product versions
      - id: E2.3
        name: Order Management
        description: Capture, orchestrate, validate, and manage order lifecycle
        features:
          - id: F-037
            name: Order Capture
            priority: P0
            dependencies: [F-029, F-034]
            acceptance_criteria:
              - Order creation with customer, products, and payment method
              - Order item validation against product catalog
              - Quote-to-order conversion with pricing preview
              - Order amendments before fulfillment
          - id: F-038
            name: Order Orchestration
            priority: P0
            dependencies: [F-037]
            acceptance_criteria:
              - Order decomposition into fulfillment tasks
              - Parallel and sequential task execution
              - Partial fulfillment with back-order support
              - Order status tracking with progress visibility
          - id: F-039
            name: Order Lifecycle Management
            priority: P1
            dependencies: [F-037]
            acceptance_criteria:
              - States: Pending, Validated, InProgress, Completed, Failed, Cancelled
              - State transitions with business rule validation
              - Hold/release order capability
              - Order history with audit trail
          - id: F-040
            name: Order Validation
            priority: P1
            dependencies: [F-037]
            acceptance_criteria:
              - Customer eligibility validation (credit check, account status)
              - Product availability validation (inventory check)
              - Address validation and geocoding
              - Business rules validation engine
      - id: E2.4
        name: Subscription Management
        description: Manage subscription lifecycle, entitlements, renewals, and modifications
        features:
          - id: F-041
            name: Subscription Lifecycle
            priority: P0
            dependencies: [F-037, F-038]
            acceptance_criteria:
              - Subscription creation from fulfilled order
              - States: Pending, Active, Suspended, Cancelled, Expired
              - Subscription with start date, end date, and billing cycle
              - Multi-service subscriptions (bundles)
          - id: F-042
            name: Subscription Entitlements
            priority: P1
            dependencies: [F-041]
            acceptance_criteria:
              - Entitlement calculation from product catalog and subscription
              - Usage allowance tracking against plan limits
              - Overage and throttling enforcement
              - Real-time entitlement queries for service provisioning
          - id: F-043
            name: Subscription Renewals
            priority: P1
            dependencies: [F-041]
            acceptance_criteria:
              - Auto-renew and manual renew options
              - Renewal reminder notifications before expiry
              - Renewal pricing application (standard or promotional)
              - Failed renewal handling (retry, notify, suspend)
          - id: F-044
            name: Subscription Modifications
            priority: P1
            dependencies: [F-041]
            acceptance_criteria:
              - Plan change (upgrade/downgrade) with prorated billing
              - Add-on/remove services mid-cycle
              - Pending changes with future effective dates
              - Change impact simulation before confirmation

  - id: P3
    name: Revenue Core
    status: completed
    completed_date: "2027-03-31"
    description: >
      Build the revenue generation and collection modules: Rating Engine for usage
      calculation, Billing Engine for invoice generation, Invoice Management, Payment
      Processing, and Collections for dunning and recovery.
    duration: "5 months"
    start_date: "2026-11-01"
    end_date: "2027-03-31"
    epics:
      - id: E3.1
        name: Rating Engine
        description: Calculate usage charges, apply discounts, and enforce rating policies
        features:
          - id: F-045
            name: Usage Rating
            priority: P0
            dependencies: [F-034, F-041]
            acceptance_criteria:
              - Usage event ingestion from network/service elements
              - Rating based on product catalog price models
              - Unit-based, time-based, and volume-based rating
              - Concurrent rating with exactly-once semantics
          - id: F-046
            name: Discount & Promotion Engine
            priority: P0
            dependencies: [F-045]
            acceptance_criteria:
              - Percentage and fixed-amount discounts
              - Conditional discounts (loyalty, volume, bundled)
              - Promotional periods with automatic expiration
              - Discount stacking rules and precedence
          - id: F-047
            name: Rating Policies
            priority: P1
            dependencies: [F-045]
            acceptance_criteria:
              - Rate table management with effective dating
              - Tax zone and jurisdiction-based rating
              - Currency conversion for international services
              - Rating policy versioning and audit log
          - id: F-048
            name: Real-Time Rating
            priority: P1
            dependencies: [F-045, F-013]
            acceptance_criteria:
              - Session-based real-time usage tracking
              - Pre-paid balance deduction during usage
              - Threshold alerts for usage limits
              - Sub-100ms rating response for real-time services
      - id: E3.2
        name: Billing Engine
        description: Manage billing cycles, generate invoices, process adjustments, and tax
        features:
          - id: F-049
            name: Billing Cycle Management
            priority: P0
            dependencies: [F-041, F-045]
            acceptance_criteria:
              - Configurable billing cycles (monthly, quarterly, annual)
              - Cycle scheduling with batch processing
              - Proration for mid-cycle changes
              - Billing cycle exception handling
          - id: F-050
            name: Invoice Generation
            priority: P0
            dependencies: [F-049]
            acceptance_criteria:
              - Invoice generation from recurring charges, usage, and adjustments
              - Tax calculation per jurisdiction
              - Multi-currency invoice support
              - Invoice templates with configurable layout
          - id: F-051
            name: Billing Adjustments
            priority: P1
            dependencies: [F-049]
            acceptance_criteria:
              - Credit and debit adjustment types
              - Adjustment approval workflow
              - Retroactive and future-dated adjustments
              - Reversal and correction processing
          - id: F-052
            name: Tax Calculation
            priority: P1
            dependencies: [F-049, F-050]
            acceptance_criteria:
              - Tax determination based on service jurisdiction
              - Support for VAT, GST, sales tax, and custom taxes
              - Tax exemption handling with certificate management
              - Tax report generation for regulatory compliance
      - id: E3.3
        name: Invoice Management
        description: Manage invoice lifecycle, presentment, disputes, and credit notes
        features:
          - id: F-053
            name: Invoice Lifecycle
            priority: P0
            dependencies: [F-050]
            acceptance_criteria:
              - States: Draft, Generated, Sent, Paid, Disputed, Cancelled
              - Invoice delivery scheduling (Email, Portal, Mail)
              - Invoice cancellation with reversal entries
              - Invoice archiving and retention
          - id: F-054
            name: Invoice Presentment
            priority: P1
            dependencies: [F-053]
            acceptance_criteria:
              - PDF generation with branded templates
              - Web-based invoice viewer
              - Invoice summary with usage breakdown
              - Multi-language invoice support
          - id: F-055
            name: Dispute Management
            priority: P1
            dependencies: [F-053]
            acceptance_criteria:
              - Dispute submission with reason codes and evidence
              - Dispute investigation workflow
              - Hold collection on disputed amounts
              - Resolution with adjustment or rejection
          - id: F-056
            name: Credit Notes
            priority: P2
            dependencies: [F-053]
            acceptance_criteria:
              - Credit note generation from adjustments and disputes
              - Credit note application to future invoices
              - Credit note reporting and audit trail
      - id: E3.4
        name: Payment Processing
        description: Handle payment gateway integration, reconciliation, refunds, and methods
        features:
          - id: F-057
            name: Payment Gateway Integration
            priority: P0
            dependencies: [F-053]
            acceptance_criteria:
              - Integration with Stripe, Adyen, or equivalent gateway
              - Card, ACH/bank transfer, and digital wallet support
              - Recurring payment tokenization
              - Webhook handling for gateway events
          - id: F-058
            name: Payment Reconciliation
            priority: P0
            dependencies: [F-057]
            acceptance_criteria:
              - Automatic payment-to-invoice matching
