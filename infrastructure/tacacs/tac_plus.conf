accounting = yes

key = obss_tacacs_secret

user = testuser {
    login = cleartext testpass123
    name = "Test User"
    member = admin
}

user = admin {
    login = cleartext admin456
    name = "OBSS Admin"
    member = admin
}

user = monitor {
    login = cleartext healthcheck
    name = "Monitoring"
    member = monitor
}

group = admin {
    default service = permit
    cmd = show {
        permit .*
    }
    cmd = configure {
        deny .*
    }
}

group = monitor {
    default service = deny
    cmd = show {
        permit .*
    }
}
