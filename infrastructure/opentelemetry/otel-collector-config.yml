# =============================================================================
# OBSS Platform - OpenTelemetry Collector Configuration
# Telecom OSS/BSS Platform
# =============================================================================

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
    send_batch_max_size: 2048

  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  attributes:
    actions:
      - key: environment
        value: production
        action: insert
      - key: platform
        value: obss
        action: insert

  resource:
    attributes:
      - key: service.namespace
        value: obss
        action: upsert

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777
  zpages:
    endpoint: 0.0.0.0:55679
  basicauth/client:
    client_auth:
      username: admin
      password: ${env:OPENSEARCH_INITIAL_ADMIN_PASSWORD}

exporters:
  # Prometheus exporter (metrics)
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: obss
    enable_open_metrics: true
    resource_to_telemetry_conversion:
      enabled: true

  # OpenSearch exporter (logs and traces)
  opensearch:
    dataset: obss-logs
    namespace: obss-platform
    http:
      endpoint: http://opensearch:9200
      tls:
        insecure: true
      auth:
        authenticator: basicauth/client

  # Debug exporter (for development)
  debug:
    verbosity: detailed
    sampling_initial: 5
    sampling_thereafter: 100

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, attributes, batch]
      exporters: [opensearch, debug]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource, attributes, batch]
      exporters: [prometheus, debug]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, attributes, batch]
      exporters: [opensearch, debug]

  extensions: [health_check, pprof, zpages, basicauth/client]
