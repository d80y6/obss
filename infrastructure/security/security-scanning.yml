# Security Scanning Pipeline
# Telecom OSS/BSS Platform
# Runs on push to main and pull requests

name: Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC

env:
  DOTNET_VERSION: '9.0.x'
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  SONAR_HOST_URL: 'https://sonarcloud.io'

jobs:
  nuget-audit:
    name: NuGet Vulnerability Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Check for vulnerable packages
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee nuget-audit.log
          if grep -q "vulnerable" nuget-audit.log; then
            echo "::warning::Vulnerable packages detected. Review nuget-audit.log for details."
          fi

      - name: Upload NuGet audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nuget-audit
          path: nuget-audit.log

  roslyn-analyzers:
    name: Roslyn Security Analyzers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Run Roslyn analyzers with security rules
        run: |
          dotnet build --no-restore \
            -p:RunAnalyzersDuringBuild=true \
            -p:EnforceCodeStyleInBuild=true \
            -p:AnalysisLevel=latest-All \
            -warnaserror \
            2>&1 | tee roslyn-audit.log

      - name: Upload Roslyn results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: roslyn-analyzers
          path: roslyn-audit.log

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    if: env.SONAR_TOKEN != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Install SonarCloud scanner
        run: |
          dotnet tool install --global dotnet-sonarscanner
          dotnet tool install --global coverlet.console

      - name: Begin SonarCloud scan
        run: |
          dotnet sonarscanner begin \
            /k:"obss-platform" \
            /o:"obss" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.host.url="${{ env.SONAR_HOST_URL }}" \
            /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml" \
            /d:sonar.exclusions="**/Migrations/**" \
            /d:sonar.coverage.exclusions="**/Migrations/**,**/*.Tests/**"

      - name: Build and run tests with coverage
        run: |
          dotnet build --no-incremental
          dotnet test --no-build \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=opencover \
            /p:ExcludeByFile="**/Migrations/*.cs"

      - name: End SonarCloud scan
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

  trivy-fs-scan:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy fs scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Upload Trivy SARIF (filesystem)
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-filesystem

  trivy-container-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    needs: [nuget-audit, roslyn-analyzers]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t obss-platform:ci -f src/Obss.Api/Dockerfile .

      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          scan-ref: obss-platform:ci
          format: sarif
          output: trivy-container-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Upload Trivy SARIF (container)
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-container-results.sarif
          category: trivy-container

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          allow-licenses: MIT, Apache-2.0, BSD-3-Clause, BSD-2-Clause, MS-PL
          comment-summary-in-pr: true

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  results-summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs:
      - nuget-audit
      - roslyn-analyzers
      - trivy-fs-scan
      - dependency-review
      - secret-scan
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| NuGet Audit | ${{ needs.nuget-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Roslyn Analyzers | ${{ needs.roslyn-analyzers.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy FS Scan | ${{ needs.trivy-fs-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Review | ${{ needs.dependency-review.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scan | ${{ needs.secret-scan.result }} |" >> $GITHUB_STEP_SUMMARY
