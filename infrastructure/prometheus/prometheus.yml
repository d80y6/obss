# =============================================================================
# OBSS Platform - Prometheus Configuration
# Telecom OSS/BSS Platform
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  external_labels:
    cluster: obss
    environment: production

# Rule files
rule_files:
  - "alerting-rules.yml"
  - "recording-rules.yml"

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Scrape configurations
scrape_configs:
  # ── Prometheus self-monitoring ─────────────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: prometheus
          component: monitoring

  # ── OpenTelemetry Collector ────────────────────────────────────────────
  - job_name: "otel-collector"
    scrape_interval: 15s
    static_configs:
      - targets: ["otel-collector:8888"]
        labels:
          service: otel-collector
          component: telemetry
      - targets: ["otel-collector:8889"]
        labels:
          service: otel-collector
          component: telemetry

  # ── API Gateway ────────────────────────────────────────────────────────
  - job_name: "obss-api-gateway"
    scrape_interval: 15s
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
          - "obss-api-gateway:8080"
        labels:
          service: api-gateway
          module: gateway
          tier: gateway

  # ── IAM Module ─────────────────────────────────────────────────────────
  - job_name: "obss-iam"
    scrape_interval: 15s
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
          - "obss-iam:8080"
        labels:
          service: iam
          module: iam
          tier: core

