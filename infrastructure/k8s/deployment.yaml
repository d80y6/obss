apiVersion: apps/v1
kind: Deployment
metadata:
  name: obss-api
  namespace: obss
  labels:
    app: obss-api
    app.kubernetes.io/name: obss-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: obss-platform
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: obss-api
  template:
    metadata:
      labels:
        app: obss-api
        app.kubernetes.io/name: obss-api
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: obss-api
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: obss-api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: ASPNETCORE_URLS
              value: "http://0.0.0.0:8080;http://0.0.0.0:8081"
            - name: POSTGRES_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: obss-db-connection
                  key: connection-string
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: obss-db-connection
                  key: password
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          startupProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
