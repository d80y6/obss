apiVersion: v1
kind: Service
metadata:
  name: obss-api
  namespace: obss
  labels:
    app: obss-api
    app.kubernetes.io/name: obss-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: obss-platform
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: health
      port: 8081
      targetPort: health
      protocol: TCP
  selector:
    app: obss-api
