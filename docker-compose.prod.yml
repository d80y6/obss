# ═══════════════════════════════════════════════════════════════════════════════
# Production Docker Compose Overrides
# Telecom OSS/BSS Platform
#
# Applied alongside docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Applies:
#   - Resource limits
#   - Restart policies (always)
#   - Logging configuration (max-size, max-file)
#   - Read-only root filesystem where applicable
#   - Health check configurations
#   - Backup volume mounts
# ═══════════════════════════════════════════════════════════════════════════════

networks:
  obss-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres_backup:
    driver: local
  postgres_wal:
    driver: local
  keycloak_backup:
    driver: local
  opensearch_backup:
    driver: local
  backup_scripts:
    driver: local

x-logging-prod: &logging-prod
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-healthcheck: &healthcheck-prod
  start_period: 60s
  interval: 10s
  timeout: 5s
  retries: 5

x-readonly-root: &readonly-root
  read_only: true
  tmpfs:
    - /tmp:noexec,nosuid,size=128M
    - /var/run:noexec,nosuid,size=64M

services:
  # ── PostgreSQL 16 ───────────────────────────────────────────────────────────
  postgres:
    restart: always
    logging: *logging-prod
    volumes:
      - postgres_backup:/backup:rw
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-obss_admin} -d ${POSTGRES_DB:-obss}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s

  # ── Redis 7 ────────────────────────────────────────────────────────────────
  redis:
    restart: always
    <<: *readonly-root
    logging: *logging-prod
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-obss_r3d1s_p@ss}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 3600 1
      --dir /data
      --dbfilename dump.rdb
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.2"
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-obss_r3d1s_p@ss}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── RabbitMQ 3.13 ──────────────────────────────────────────────────────────
  rabbitmq:
    restart: always
    logging: *logging-prod
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-obss_admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-obss_rmq_s3cur3}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
      RABBITMQ_VM_MEMORY_HIGH_WATERMARK: 0.6
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "+P 1048576 +t 256"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.2"
          memory: 128M
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── MinIO ───────────────────────────────────────────────────────────────────
  minio:
    restart: always
    logging: *logging-prod
    command: server /data --console-address ":9001"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.2"
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ── OpenSearch 2.x ─────────────────────────────────────────────────────────
  opensearch:
    restart: always
    logging: *logging-prod
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: true
      DISABLE_INSTALL_DEMO_CONFIG: true
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-Obss_0p3nS3@rch!}
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
      bootstrap.memory_lock: false
      plugins.security.disabled: true
      plugins.security.ssl.http.enabled: false
      cluster.name: obss-opensearch
      node.name: obss-opensearch
    volumes:
      - opensearch_backup:/usr/share/opensearch/backup:rw
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 180s

  # ── Keycloak 26.x ──────────────────────────────────────────────────────────
  keycloak:
    restart: always
    logging: *logging-prod
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-obss_kc_s3cur3}
      KC_DB: ${KC_DB:-postgres}
      KC_DB_URL: ${KC_DB_URL:-jdbc:postgresql://postgres:5432/obss_keycloak}
      KC_DB_USERNAME: ${KC_DB_USERNAME:-obss_admin}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-obss_s3cur3_p@ss}
      KC_HOSTNAME: ${KEYCLOAK_HOST:-keycloak}
      KC_HOSTNAME_PORT: ${KEYCLOAK_PORT:-8080}
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: ${KEYCLOAK_PORT:-8080}
      KC_HTTPS_PORT: ${KEYCLOAK_HTTPS_PORT:-8443}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_LOG_LEVEL: INFO
      KC_PROXY: edge
      KC_CACHE_CONFIG_FILE: cache-ispn.xml
    volumes:
      - keycloak_backup:/backup:rw
    command:
      - "start"
      - "--optimized"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080; echo -e 'GET /realms/obss/.well-known/openid-configuration HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; cat <&3 | head -n 1 | grep -q 200"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 180s
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    restart: always
    logging: *logging-prod
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
      - "--log.level=info"
      - "--web.enable-admin-api"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.2"
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:9090/-/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    restart: always
    logging: *logging-prod
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-obss_gr4f_s3cur3}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_SERVER_ROOT_URL: http://localhost:3000
      GF_LOG_MODE: console
      GF_LOG_LEVEL: info
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_COOKIE_SAMESITE: strict
      GF_DATE_TIMEZONE: UTC
    volumes:
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3000/api/health | grep -q 'ok'"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      prometheus:
        condition: service_healthy

  # ── OpenTelemetry Collector ────────────────────────────────────────────────
  otel-collector:
    restart: always
    logging: *logging-prod
    command:
      - "--config=/etc/otel-collector-config.yml"
      - "--set=service.telemetry.logs.level=info"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.2"
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:13133"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      prometheus:
        condition: service_healthy
      opensearch:
        condition: service_healthy

  # ── .NET OBSS Host (Modular Monolith) ─────────────────────────────────
  obss-host:
    restart: always
    logging: *logging-prod
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://0.0.0.0:8080
      DOTNET_ENVIRONMENT: Production
      DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "true"
      DOTNET_GC_HEAPCOUNT: "4"
      DOTNET_GCgen0SIZE: "8388608"
      DOTNET_GCgen1SIZE: "8388608"
      DOTNET_GCCONCURRENT: "true"
      DOTNET_GCSERVER: "true"
      ConnectionStrings__DefaultConnection: Host=${POSTGRES_HOST};Port=${POSTGRES_PORT};Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Pooling=true;Minimum Pool Size=5;Maximum Pool Size=100;Multiplexing=true;Keepalive=30;Command Timeout=30
      ConnectionStrings__Redis: ${REDIS_CONNECTION_STRING},abortConnect=false,connectTimeout=5000,syncTimeout=5000,keepAlive=60
      ConnectionStrings__RabbitMQ: ${RABBITMQ_CONNECTION_STRING},heartbeat=30,automaticRecoveryEnabled=true,networkRecoveryInterval=10
      Keycloak__Authority: http://${KEYCLOAK_HOST}:${KEYCLOAK_PORT}/realms/${KEYCLOAK_REALM}
      Keycloak__ClientId: ${KEYCLOAK_CLIENT_ID}
      Keycloak__Audience: obss-api
      Keycloak__RequireHttpsMetadata: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-obss-host}
      OTEL_METRICS_EXPORTER: otlp
      OTEL_TRACES_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: otlp
      OTEL_BSP_SCHEDULE_DELAY: 1000
      OTEL_BSP_MAX_EXPORT_BATCH_SIZE: 512
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M

  # ── Frontend (Next.js) ────────────────────────────────────────────────
  obss-frontend:
    restart: always
    logging: *logging-prod
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://obss-host:8080
      NEXT_PUBLIC_KEYCLOAK_URL: http://${KEYCLOAK_HOST}:${KEYCLOAK_PORT}
      NEXT_PUBLIC_KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: obss-frontend
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.2"
          memory: 128M
    depends_on:
      obss-host:
        condition: service_started
      keycloak:
        condition: service_healthy
